<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./css/style2.css">

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <title> Cadastrar </title>
  </head>
  <body>
    
    <form action="/action_page.php" method="post">
      <fieldset>
        
        <div class="formulario">
          <h1>Cadastro</h1>
        </div>
        
        <div class="imgcontainer">
          <div class="container_img">
            <div class="row">
              <div class="column">
                <img src="./imagens/avatar.png" alt="Avatar" class="avatar">
                <input type="radio" id="Masculino" name="sexo" value="M">
                <label for="masculino">Homem</label>
              </div>
            </div>
          </div>    
                   
            <div class="container_img2">
              <div class="column">
                <img src="./imagens/avatar2.png" alt="Avatar" class="avatar">
                <input type="radio" id="Feminino" name="sexo" value="F">
                <label for="feminino">Mulher</label>
              </div>
            </div>
            
        </div>
        
        
        <div class="container">
          <div>
            <label for="uname"><b>Usuário</b></label>
          </div>
          <div>
            <input type="text" placeholder="Insira seu nome completo" name="uname" required>
          </div>
          
          <div>
            <label for="psw"><b>Senha</b></label>
          </div>
          <div>  
            <input type="password" placeholder="Crie uma senha" name="psw" required>
          </div>
          
          <div>
            <label for="nasc"><b>Nascimento</b></label>
          </div>       
          <div>
            <input type="date" placeholder="Coloque sua data" name="nasc" required>
          </div>
          
          <div>
            <label for="email"><b>E-mail</b></label>
          </div>
          <div>
            <input type="email" placeholder="Digite seu e-mail" name="email" required>
          </div>
          
          <div>
            <label for="cont"><b>Contato</b></label>
          </div>
          <div>
            <input type="tel" placeholder="Digite seu número de celular" name="cont" required>
          </div>
          
        </div>
        
       
          <button type="button" class="cadastrar">Cadastrar</button>
        
        
      </fieldset>
  </form>
</body>
</html>
